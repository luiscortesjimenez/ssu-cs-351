<!DOCTYPE html>
<html>
    <head>
        <script src="initShaders.js"></script>

        <script id="vertex-shader" type="x-shader/x-vertex">
            uniform float N, t;

            out float radius;

            void main() {
                if (gl_VertexID == 0) {
                    radius = 0.0;
                    gl_Position = vec4(0.0, 0.0, 0.0, 1.0);
                    return;
                }

                radius = (gl_VertexID % 2 == 0) ? 1.0 : 0.4;
                float angle = 2.0 * 3.14159 * float(gl_VertexID) / N + t;
                gl_Position = vec4(radius * vec2(cos(angle), sin(angle)), 0.0, 1.0);
            }
        </script>
        
        <script id="fragment-shader" type="x-shader/x-fragment">
            in float radius;
            out vec4 fColor;

            void main() {
                const vec4 inner = vec4(1.0, 0.1, 0.4, 1.0); // hot pink at the core
                const vec4 outer = vec4(1.0, 0.95, 0.2, 1.0); // bright yellow at the points
                fColor = mix(inner, outer, radius);
            }
        </script>

        <script>
            window.onload = () => {
                var canvas = document.getElementById("webgl");
                var gl = canvas.getContext("webgl2");

                gl.clearColor(0.05, 0.05, 0.1, 1.0);

                var program = initShaders(gl, "vertex-shader", "fragment-shader");
                
                var uN = gl.getUniformLocation(program, "N");
                var uTime = gl.getUniformLocation(program, "t");

                var t = 0.0;

                var render = () => {
                    t += 0.01;  // Tick time

                    gl.clear(gl.COLOR_BUFFER_BIT);
                    gl.useProgram(program);

                    const N = 12; // number of vertices (1 center + 11 perimeter)

                    gl.uniform1f(uN, N);
                    gl.uniform1f(uTime, t);

                    gl.drawArrays(gl.TRIANGLE_FAN, 0, N);

                    requestAnimationFrame(render);
                };

                render();
            };
        </script>
    </head>

    <body>
        <canvas id="webgl" width="512" height="512"></canvas>
    </body>
</html>
